<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Понедельник — структура ответа на предписание — интерактив</title>
<style>
  :root{--ink:#1a1814;--muted:#6f7280;--line:#e9e4dc;--card:#faf8f5;--green:#1f9d57;--brand:#e2231a;--blue:#237cf9;--font:'Proxima Nova','Helvetica Neue','Segoe UI',Arial,system-ui,sans-serif}
  *,*:before,*:after{box-sizing:border-box}
  html,body{overflow-x:hidden;margin:0}
  body{background:#fff;color:var(--ink);font-family:var(--font);line-height:1.6}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 60px}
  .sec{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px}
  h3{font-size:16px;margin:0 0 8px;font-weight:800}
  p{margin:0 0 12px}.muted{color:var(--muted)}
  .note{font-size:13.5px;color:#7a5b16;background:#fdf6e3;border:1px solid #f3e3b3;border-radius:12px;padding:12px 14px;margin-top:14px}
  .note.green{color:#157a41;background:#eef8f1;border-color:#cdebd8}.note.red{color:#a3201a;background:#fdf0ef;border-color:#f3c7c3}
  .opts{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
  .opt{cursor:pointer;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;font-size:13.5px;font-family:inherit;color:var(--ink);transition:.15s}
  .opt:hover{border-color:var(--ink)}
  .opt.ok{border-color:var(--green);background:#eef8f1}
  .opt.err{border-color:var(--brand);background:#fdf0ef}
  .opt:disabled{cursor:default;opacity:.9}
  .opt small{display:block;color:var(--muted);font-size:12px;margin-top:3px}
  .qfb{margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <section class="sec">
    <h3>🔁 Сначала — «шаг назад»</h3>
    <p class="muted">В сложной задаче не бросайтесь писать письмо. Сначала спросите у ИИ принцип, потом применяйте. Вы задали: <i>«Какова правильная структура ответа на предписание стройконтроля и что обязательно включить?»</i> — и получили три варианта плана ответа. Выберите лучший.</p>

    <div class="opts" data-choice>
      <button class="opt" data-fb="Тон извинения и обещаний без конкретики — стройконтроль ждёт не эмоций, а плана: по каждому пункту мероприятие, ответственный и срок не позднее указанного в предписании.">
        <b>Вариант A.</b> Письмо-извинение: признать вину, заверить, что «всё исправим в кратчайшие сроки», попросить не останавливать работы.
        <small>Мягкий тон, без разбивки по пунктам</small>
      </button>
      <button class="opt" data-correct data-fb="Верно. Ответ структурирован по трём пунктам предписания, у каждого — мероприятие, ответственный и срок в рамках предписания (п.1 до 28.06, п.2 до 26.06, п.3 немедленно). Это и есть корректная структура ответа на предписание.">
        <b>Вариант B.</b> По каждому из 3 пунктов: суть нарушения → мероприятие по устранению → ответственный → срок (не позднее срока предписания). Нейтральный деловой тон.
        <small>Разбивка 1–3, ответственные и сроки из предписания</small>
      </button>
      <button class="opt" data-fb="Оспаривать ссылку на СП можно только предметно и отдельным письмом — и сначала это надо проверить по первоисточнику. Как ответ на предписание в срок это не годится: работы стоят.">
        <b>Вариант C.</b> Оспорить предписание: усомниться в ссылке на СП 70.13330 и требовать снять запрет на бетонирование.
        <small>Спор по нормативу вместо плана устранения</small>
      </button>
    </div>
    <div class="qfb" data-choice-fb></div>
  </section>
</div>
<script>
(function(){
  document.querySelectorAll('[data-choice]').forEach(function(group){
    var fb=group.parentNode.querySelector('[data-choice-fb]');
    group.querySelectorAll('.opt').forEach(function(btn){
      btn.addEventListener('click',function(){
        var ok=btn.hasAttribute('data-correct');
        group.querySelectorAll('.opt').forEach(function(b){
          b.disabled=true;
          if(b.hasAttribute('data-correct'))b.classList.add('ok');
        });
        if(!ok)btn.classList.add('err');
        if(fb)fb.innerHTML='<div class="note '+(ok?'green':'red')+'">'+(ok?'✅ <b>Верно.</b> ':'❌ <b>Не то.</b> ')+(btn.dataset.fb||'')+'</div>';
      });
    });
  });
})();
</script>
</body>
</html>
