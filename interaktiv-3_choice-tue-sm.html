<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>День 2 — записка руководителю о выборе подрядчика — интерактив</title>
<style>
  :root{--ink:#1a1814;--muted:#6f7280;--line:#e9e4dc;--card:#faf8f5;--card2:#f3efe9;--green:#1f9d57;--brand:#e2231a;--blue:#237cf9;--purple:#9b5de5;--rs:10px;--r:16px;--font:'Proxima Nova','Helvetica Neue','Segoe UI',Arial,system-ui,sans-serif}
  *,*:before,*:after{box-sizing:border-box}
  html,body{overflow-x:hidden;margin:0}
  body{background:#fff;color:var(--ink);font-family:var(--font);line-height:1.6}
  img,svg,table{max-width:100%}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 60px}
  .sec{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:24px}
  .stp{font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:0 0 6px}
  h2{font-size:21px;margin:2px 0 12px;font-weight:800;letter-spacing:-.01em}
  h3{font-size:16px;margin:0 0 8px;font-weight:800}
  p{margin:0 0 12px}.muted{color:var(--muted)}
  .note{font-size:13.5px;color:#7a5b16;background:#fdf6e3;border:1px solid #f3e3b3;border-radius:12px;padding:12px 14px;margin-top:14px}
  .note.green{color:#157a41;background:#eef8f1;border-color:#cdebd8}.note.red{color:#a3201a;background:#fdf0ef;border-color:#f3c7c3}
  .tw{overflow-x:auto;margin-top:6px}
  table.doctbl{border-collapse:collapse;width:100%;font-size:12px;min-width:420px}
  table.doctbl th,table.doctbl td{border:1px solid var(--line);padding:5px 8px;text-align:left;vertical-align:top}
  table.doctbl th{background:var(--card);font-weight:800;font-size:11px}
  td.hl{background:#fde4e2;color:#8f1410;font-weight:700}
  td.gap{background:#fdf6e3;color:#7a5b16;font-weight:700}
  .opts{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
  .opt{cursor:pointer;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;font-size:13.5px;font-family:inherit;color:var(--ink);transition:.15s}
  .opt:hover{border-color:var(--ink)}
  .opt.ok{border-color:var(--green);background:#eef8f1}
  .opt.err{border-color:var(--brand);background:#fdf0ef}
  .opt:disabled{cursor:default;opacity:.9}
  .opt small{display:block;color:var(--muted);font-size:12px;margin-top:3px}
  .qfb{margin-top:6px}
  .qq{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:14.5px;font-weight:700;margin:0 0 6px}

</style>
</head>
<body>
<div class="wrap">
  <section class="sec">
    <h3>🔁 Сначала — «шаг назад»</h3>
    <p class="muted">Прежде чем писать записку, спросите у ИИ принцип: <i>«Какие параметры КП обязательно учитывать при сравнении помимо цены за единицу?»</i> — и только потом просите готовый текст. Вы получили три варианта записки. Выберите верный.</p>
    <div class="opts" data-choice="">
<button class="opt" data-fb="Записка построена на одной цифре без учёта вынесенных позиций, повышенного аванса, короткой гарантии и минимального опыта — руководитель примет решение вслепую.">
<b>Вариант A.</b> «Рекомендую заключить договор с КП-3 «МонолитСервис» — цена 12 300 ₽/м³ дешевле остальных почти вдвое, это очевидная экономия для проекта».
              <small>Опалубка вынесена отдельно, аванс 50%, гарантия 2 года, опыт 1 объект — цена без этого не сравнима</small>
</button>
<button class="opt" data-correct="" data-fb="Верно. Вывод сразу, а ниже — обоснование по цене, срокам, авансу, гарантии и опыту; отдельно объяснено, почему самая низкая цена (КП-3) отклонена. Именно с «СтройМонолит» дальше по кейсу выходят на площадку.">
<b>Вариант B.</b> «Рекомендую КП-1 «СтройМонолит»: 18 900 ₽/м³ под ключ, 80 дней, аванс 30%, гарантия 5 лет, опыт 6 аналогичных объектов. КП-3 дешевле по цифре, но опалубка вынесена отдельно, аванс 50%, гарантия 2 года и всего 1 объект в портфеле — риски перекрывают экономию».
              <small>Вывод в первом абзаце + сравнение по всем критериям, не только по цене</small>
</button>
<button class="opt" data-fb="Задача сметчика — не просто отдать таблицу, а дать обоснованную рекомендацию с выводом в начале; иначе записка не выполняет свою функцию.">
<b>Вариант C.</b> Таблица всех параметров по 5 КП без вывода и рекомендации — пусть руководитель решает сам.
              <small>Нет вывода — это не записка, а сырые данные</small>
</button>
</div>
    <div class="qfb" data-choice-fb=""></div>
  </section>
</div>
<script>
(function(){
  document.querySelectorAll('[data-choice]').forEach(function(group){
    var fb=group.parentNode.querySelector('[data-choice-fb]');
    group.querySelectorAll('.opt').forEach(function(btn){
      btn.addEventListener('click',function(){
        var ok=btn.hasAttribute('data-correct');
        group.querySelectorAll('.opt').forEach(function(b){
          b.disabled=true;
          if(b.hasAttribute('data-correct'))b.classList.add('ok');
        });
        if(!ok)btn.classList.add('err');
        if(fb)fb.innerHTML='<div class="note '+(ok?'green':'red')+'">'+(ok?'✅ <b>Верно.</b> ':'❌ <b>Не то.</b> ')+(btn.dataset.fb||'')+'</div>';
      });
    });
  });
})();

</script>
</body>
</html>
