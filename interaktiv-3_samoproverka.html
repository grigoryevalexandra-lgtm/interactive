<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Интерактив 3. Чек-лист самопроверки</title>
<style>
  :root{--ink:#1a1814;--muted:#6f7280;--line:#e9e4dc;--card2:#f3efe9;--green:#1f9d57;--font:'Proxima Nova','Helvetica Neue','Segoe UI',Arial,system-ui,sans-serif}
  *,*:before,*:after{box-sizing:border-box}
  html,body{overflow-x:hidden;margin:0}
  body{background:#fff;color:var(--ink);font-family:var(--font);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:0 auto;padding:16px}
  h3{font-size:16px;margin:0 0 8px;font-weight:800}
  p{margin:0 0 12px;word-break:break-word}
  .muted{color:var(--muted)}
  .selfcheck{list-style:none;padding:0;margin:8px 0 0}
  .selfcheck li{border-bottom:1px solid var(--line)}
  .selfcheck li:last-child{border-bottom:none}
  .selfcheck label{display:flex;gap:11px;align-items:flex-start;padding:9px 0;font-size:14.5px;cursor:pointer;margin:0}
  .selfcheck input{width:18px;height:18px;flex:0 0 auto;margin:3px 0 0;accent-color:var(--green)}
  .scbar{height:9px;border-radius:6px;background:var(--card2);overflow:hidden;margin-top:14px}
  .scbar i{display:block;height:100%;width:0;background:var(--green);border-radius:6px;transition:.35s}
  .scmsg{font-size:13px;font-weight:700;margin-top:7px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <h3>Перед сдачей отметьте</h3>
  <p class="muted">Быстрая самопроверка усвоения материала Шага 5 — без сохранения данных, только для вас.</p>
  <ul class="selfcheck" id="scList">
    <li><label><input type="checkbox"> Я попробовал(а) один и тот же вопрос без документа и с документом — и увидел(а) разницу в ответе.</label></li>
    <li><label><input type="checkbox"> Мой промпт содержит роль, контекст (документ/данные), задачу и формат ответа.</label></li>
    <li><label><input type="checkbox"> Я не приложил(а) к запросу персональные данные, коммерческую тайну или несогласованные финансовые условия.</label></li>
    <li><label><input type="checkbox"> Я понимаю: уверенный тон ИИ не гарантирует точность — критичные цифры и ссылки проверяю по первоисточнику.</label></li>
  </ul>
  <div class="scbar"><i id="scBar"></i></div>
  <div class="scmsg" id="scMsg">0 из 4 — пройдитесь по списку</div>
</div>
<script>
(function(){
  var list=document.getElementById('scList');
  var boxes=list.querySelectorAll('input[type=checkbox]'), bar=document.getElementById('scBar'), msg=document.getElementById('scMsg');
  function upd(){
    var n=0; boxes.forEach(function(b){if(b.checked)n++;});
    bar.style.width=(100*n/boxes.length)+'%';
    msg.textContent=(n===boxes.length)?('✅ Все '+n+' пунктов — можно двигаться дальше'):(n+' из '+boxes.length+' — пройдитесь по списку');
    msg.style.color=(n===boxes.length)?'#1f9d57':'#6f7280';
  }
  boxes.forEach(function(b){b.addEventListener('change',upd);});
  upd();
})();
</script>
</body>
</html>
