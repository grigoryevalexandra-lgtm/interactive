<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* Ювелирная подгонка под маску iPad */
            --v-top: 7.2%;    
            --v-left: 5.2%;   
            --v-width: 89.6%; 
            --v-height: 85.6%;
            --v-round: 20px;  
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Начинаем сверху, чтобы избежать обрезки снизу */
            min-height: 100vh;
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }

        .main-container {
            display: flex;
            flex-direction: column; /* СТРОГО ВЕРТИКАЛЬНО */
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 600px; /* Ограничиваем по ширине iPad */
        }

        /* КОРПУС iPAD */
        .ipad-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3; /* Соотношение сторон горизонтального iPad */
            background: transparent; 
            z-index: 2;
        }

        .ipad-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            object-fit: contain;
        }

        .screen-area {
            position: absolute;
            top: var(--v-top);
            left: var(--v-left);
            width: var(--v-width);
            height: var(--v-height);
            background: #000; 
            overflow: hidden;
            border-radius: var(--v-round);
            z-index: 1;
        }

        .video-track {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }

        video {
            width: 50%;
            height: 100%;
            object-fit: contain; 
        }

        /* ТЕКСТОВАЯ ПАНЕЛЬ (ПОД АЙПАДОМ) */
        .carousel-bottom {
            width: 100%;
        }

        .prompt-box {
            background: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            min-height: 180px; /* Чтобы высота не прыгала */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .prompt-item { display: none; }
        .prompt-item.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header {
            font-size: 10px;
            font-weight: 700;
            color: #888; 
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }

        .text {
            font-size: 15px;
            line-height: 1.5;
            color: #000;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .nav { display: flex; gap: 10px; }

        .btn {
            width: 38px;
            height: 38px;
            border: 1px solid #000;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .btn:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="ipad-wrapper">
        <img src="ipad.png" class="ipad-mask" alt="iPad">
        <div class="screen-area">
            <div class="video-track" id="videoTrack">
                <video id="v0" playsinline muted loop>
                    <source src="https://github.com/grigoryevalexandra-lgtm/interactive/raw/refs/heads/main/17.mp4" type="video/mp4">
                </video>
                <video id="v1" playsinline muted loop>
                    <source src="https://github.com/grigoryevalexandra-lgtm/interactive/raw/refs/heads/main/18.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </div>

    <div class="carousel-bottom">
        <div class="prompt-box">
            <div id="content-container">
                <div id="p0" class="prompt-item active">
                    <div class="header">ПРОМПТ №1</div>
                    <div class="text">«Я загрузил два файла: СП 60.13330.2016 и СП 60.13330.2020. Сравни их в части требований к системам противодымной защиты...»</div>
                </div>
                <div id="p1" class="prompt-item">
                    <div class="header">ПРОМПТ №2</div>
                    <div class="text">«Я загрузил текст из СП 7.13130 и СП 60.13330. Найди возможные противоречия в требованиях к огнезадерживающим клапанам...»</div>
                </div>
            </div>

            <div class="nav">
                <button class="btn" onclick="move(-1)">←</button>
                <button class="btn" onclick="move(1)">→</button>
            </div>
        </div>
    </div>
</div>

<script>
    let cur = 0;
    const track = document.getElementById('videoTrack');
    const prompts = [document.getElementById('p0'), document.getElementById('p1')];
    const videos = [document.getElementById('v0'), document.getElementById('v1')];

    // Старт первого видео
    videos[0].play().catch(e => console.log("Auto-play blocked"));

    function move(dir) {
        videos[cur].pause();
        videos[cur].currentTime = 0;
        
        cur = (cur + dir + 2) % 2;
        
        track.style.transform = `translateX(-${cur * 50}%)`;
        prompts.forEach((p, i) => p.classList.toggle('active', i === cur));
        
        videos[cur].play().catch(e => console.log("Play error"));
    }
</script>
</body>
</html>
