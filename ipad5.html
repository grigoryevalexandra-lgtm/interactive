<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* Ювелирная подгонка под маску iPad */
            --v-top: 7.2%;    
            --v-left: 5.2%;   
            --v-width: 89.6%; 
            --v-height: 85.6%;
            --v-round: 20px;  
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center; /* Центрируем по вертикали */
            min-height: 100vh;
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 650px; /* Оптимальный размер для фокуса на iPad */
        }

        /* КОРПУС iPAD */
        .ipad-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3; 
            background: transparent; 
            z-index: 2;
        }

        .ipad-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            object-fit: contain;
        }

        .screen-area {
            position: absolute;
            top: var(--v-top);
            left: var(--v-left);
            width: var(--v-width);
            height: var(--v-height);
            background: #000; 
            overflow: hidden;
            border-radius: var(--v-round);
            z-index: 1;
        }

        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="ipad-wrapper">
        <img src="ipad2.png" class="ipad-mask" alt="iPad">
        
        <div class="screen-area">
            <div class="video-container">
                <video id="v0" playsinline muted loop autoplay>
                    <source src="https://github.com/grigoryevalexandra-lgtm/interactive/raw/refs/heads/main/31.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </div>
</div>

<script>
    // Гарантируем запуск видео, если браузер заблокировал autoplay
    window.addEventListener('load', () => {
        const video = document.getElementById('v0');
        video.play().catch(e => console.log("Autoplay needs user interaction"));
    });
</script>

</body>
</html>
