<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --phone-width: 280px; /* Можно менять размер здесь */
            --accent-color: #000000;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: transparent;
            font-family: 'Inter', sans-serif; /* Подойдет любой чистый шрифт */
        }

        .widget-wrapper {
            display: flex;
            align-items: center;
            gap: 40px;
            max-width: 800px;
            padding: 20px;
        }

        /* КОНТЕЙНЕР ТЕЛЕФОНА */
        .phone-container {
            position: relative;
            width: var(--phone-width);
            flex-shrink: 0;
        }

        /* Картинка-рамка (твоя PNG) */
        .phone-frame {
            position: relative;
            width: 100%;
            z-index: 10;
            pointer-events: none;
            display: block;
        }

        /* Видео внутри телефона */
        .video-content {
            position: absolute;
            top: 2.2%;    /* Подгонка под экран */
            left: 5.5%;   /* Подгонка под экран */
            width: 89%;   /* Подгонка под экран */
            height: 95.5%;/* Подгонка под экран */
            z-index: 5;
            overflow: hidden;
            border-radius: 35px; /* Скругление как у iPhone */
            background: #000;
        }

        .video-content video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ТЕКСТ И СТРЕЛКА */
        .info-side {
            position: relative;
            max-width: 320px;
        }

        .text-block {
            font-size: 16px;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-color);
        }

        .text-block b {
            font-weight: 900;
            display: block;
            margin-bottom: 5px;
            font-size: 18px;
        }

        /* СТРЕЛКА SVG */
        .arrow-svg {
            position: absolute;
            left: -80px; /* Позиция между текстом и телефоном */
            top: 50px;
            width: 80px;
            transform: scaleX(-1); /* Разворачиваем, если нужно */
        }

        /* Адаптив для мобилок */
        @media (max-width: 650px) {
            .widget-wrapper {
                flex-direction: column;
                text-align: center;
            }
            .arrow-svg {
                display: none; /* На мобилках стрелка часто лишняя */
            }
        }
    </style>
</head>
<body>

<div class="widget-wrapper">
    
    <div class="phone-container">
        <img src="https://tree.png" class="phone-frame">
        
        <div class="video-content">
            <video autoplay loop muted playsinline>
                <source src="https://27.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="info-side">
        <svg class="arrow-svg" width="60" height="60" viewBox="0 0 74 62" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1C10 30 30 50 70 55" stroke="black" stroke-width="2" stroke-dasharray="4 4"/>
            <path d="M60 48L72 55L60 61" stroke="black" stroke-width="2"/>
        </svg>

        <div class="text-block">
            <b>АЛЕКСЕЙ СТАРИКОВ</b>
            О ТОМ, ЗАЧЕМ БУХГАЛТЕРЫ,<br>
            КАДРОВИКИ, ЮРИСТЫ ИДУТ В<br>
            ACTION DIGITAL SCHOOL
        </div>
    </div>

</div>

</body>
</html>
