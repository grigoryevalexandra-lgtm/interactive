<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Widget for ITR</title>
    <style>
        :root {
            /* Увеличили ширину телефона с 280px до 420px */
            --phone-width: 420px; 
            --accent-color: #000000;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        .widget-wrapper {
            display: flex;
            align-items: center;
            gap: 50px; /* Увеличили расстояние */
            max-width: 1000px;
            padding: 20px;
        }

        /* КОНТЕЙНЕР ТЕЛЕФОНА */
        .phone-container {
            position: relative;
            width: var(--phone-width);
            flex-shrink: 0;
            z-index: 10;
        }

        /* Картинка-рамка */
        .phone-frame {
            position: relative;
            width: 100%;
            z-index: 5; /* Ниже видео */
            pointer-events: none;
            display: block;
        }

        /* Видео поверх телефона */
        .video-content {
            position: absolute;
            /* Точная подгонка под БЕЛЫЙ экран ниже челки */
            top: 4.8%;    
            left: 8.5%;
            width: 83%;   
            height: 90.5%;
            z-index: 15; /* Выше рамки */
            overflow: hidden;
            /* Усилили скругление углов */
            border-radius: 40px; 
            background: #000;
        }

        .video-content video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ТЕКСТ И СТРЕЛКА */
        .info-side {
            position: relative;
            max-width: 350px;
        }

        .text-block {
            font-size: 16px;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-color);
        }

        .text-block b {
            font-weight: 900;
            display: block;
            margin-bottom: 5px;
            font-size: 18px;
        }

        /* СТРЕЛКА SVG */
        .arrow-svg {
            position: absolute;
            left: -90px;
            top: 60px;
            width: 80px;
            transform: scaleX(-1);
        }

        /* Адаптив для мобилок */
        @media (max-width: 750px) {
            .widget-wrapper {
                flex-direction: column-reverse; /* Сначала текст, потом телефон */
                text-align: center;
            }
            .arrow-svg {
                display: none;
            }
            :root {
                --phone-width: 300px; /* Уменьшаем на мобильных */
            }
        }
    </style>
</head>
<body>

<div class="widget-wrapper">
    
    <div class="phone-container">
        <img src="https://github.com/grigoryevalexandra-lgtm/interactive/raw/refs/heads/main/tree.png" class="phone-frame">
        
        <div class="video-content">
            <video controls preload="metadata">
                <source src="https://github.com/grigoryevalexandra-lgtm/interactive/raw/refs/heads/main/27.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="info-side">
        <svg class="arrow-svg" width="60" height="60" viewBox="0 0 74 62" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1C10 30 30 50 70 55" stroke="black" stroke-width="2" stroke-dasharray="4 4"/>
            <path d="M60 48L72 55L60 61" stroke="black" stroke-width="2"/>
        </svg>

        <div class="text-block">
            <b>АЛЕКСЕЙ СТАРИКОВ</b>
            О ТОМ, ЗАЧЕМ БУХГАЛТЕРЫ,<br>
            КАДРОВИКИ, ЮРИСТЫ ИДУТ В<br>
            ACTION DIGITAL SCHOOL
        </div>
    </div>

</div>

</body>
</html>
