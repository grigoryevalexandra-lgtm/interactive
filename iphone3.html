<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff; /* Элегантный бежевый фон */
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Главный контейнер — фиксирует элементы в ряд */
        .widget-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 95%;
        }

        /* Контейнер видео с золотистой окантовкой */
        .video-frame {
            position: relative;
            width: 320px;
            border-radius: 45px;
            border: 4px solid #d4af37; /* Золотой акцент */
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2);
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
            line-height: 0;
        }

        .video-frame video {
            width: 100%;
            display: block;
        }

        /* Контейнер для стрелки между видео и текстом */
        .arrow-box {
            width: 100px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .styled-arrow {
            width: 80px;
            height: auto;
            transform: scaleX(-1); /* Разворачиваем стрелку к видео */
        }

        /* Блок текста */
        .text-side {
            max-width: 400px;
            color: #1a1a1a;
        }

        .text-side h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .text-side p {
            font-size: 18px;
            line-height: 1.3;
            margin: 0;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Адаптивность: на маленьких экранах выстраиваем в колонку */
        @media (max-width: 850px) {
            .widget-layout {
                flex-direction: column-reverse;
                text-align: center;
                padding: 40px 0;
            }
            .arrow-box {
                transform: rotate(90deg);
                margin: 20px 0;
            }
        }
    </style>
</head>
<body>

<div class="widget-layout">
    
    <div class="video-frame">
        <video controls preload="metadata">
            <source src="https://github.com/grigoryevalexandra-lgtm/interactive/raw/refs/heads/main/27.mp4" type="video/mp4">
        </video>
    </div>

    <div class="arrow-box">
        <svg class="styled-arrow" viewBox="0 0 74 62" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1C10 30 30 50 70 55" stroke="#d4af37" stroke-width="3" stroke-dasharray="6 6" stroke-linecap="round"/>
            <path d="M60 48L72 55L60 61" stroke="#d4af37" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <div class="text-side">
        <h1>Исходные данные</h1>
        <p>
            Помещения: офис (30 м²) – 2 шт,<br>
            переговорная (40 м²) – 1 шт<br>
            коридор (50 м²) – 1 шт
        </p>
    </div>

</div>

</body>
</html>
