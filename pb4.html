<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Практикум: Структура плана эвакуации</title>
    <style>
        :root {
            --accent: #FF6B00;
            --bg: #FFFFFF;
            --surface: #F9F9F9;
            --text-main: #1A1A1A;
            --text-sec: #666666;
            --border: #EEEEEE;
            --success: #27AE60;
            --error: #EB5757;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 800px; padding: 60px 20px; }

        h2 { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 40px; }
        .description { text-align: center; color: var(--text-sec); margin-bottom: 40px; }

        /* Игровое поле */
        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .drop-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            min-height: 300px;
            transition: 0.3s;
        }

        .drop-zone.over { border-color: var(--accent); background: #FFF9F5; }

        .zone-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-align: center;
            color: var(--accent);
        }

        /* Элементы для перетаскивания */
        .items-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
            padding: 20px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .drag-item {
            padding: 12px 18px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: grab;
            font-size: 14px;
            user-select: none;
            transition: 0.2s;
        }

        .drag-item:active { cursor: grabbing; }
        .drag-item.correct { border-color: var(--success); color: var(--success); background: #F2FAF5; }
        .drag-item.wrong { border-color: var(--error); color: var(--error); background: #FFF5F5; }

        .btn {
            width: 100%;
            padding: 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 2px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:disabled { background: #E0E0E0; }

        .feedback { text-align: center; margin-top: 20px; font-weight: 500; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Состав плана эвакуации</h2>
    <p class="description">Перетащите элементы в соответствующие колонки согласно требованиям к планам эвакуации.</p>

    <div class="items-pool" id="pool">
        <div class="drag-item" draggable="true" data-type="graphic">Пути эвакуации</div>
        <div class="drag-item" draggable="true" data-type="text">Порядок вызова пожарных</div>
        <div class="drag-item" draggable="true" data-type="graphic">Номер этажа</div>
        <div class="drag-item" draggable="true" data-type="text">Способы оповещения</div>
        <div class="drag-item" draggable="true" data-type="graphic">Места размещения огнетушителей</div>
        <div class="drag-item" draggable="true" data-type="text">Обязанности персонала</div>
    </div>

    <div class="game-area">
        <div class="drop-zone" id="graphic" data-target="graphic">
            <div class="zone-title">Графическая часть</div>
        </div>
        <div class="drop-zone" id="text" data-target="text">
            <div class="zone-title">Текстовая часть</div>
        </div>
    </div>

    <button class="btn" id="checkBtn" onclick="checkResults()">Проверить распределение</button>
    <div class="feedback" id="feedback"></div>
</div>

<script>
    const items = document.querySelectorAll('.drag-item');
    const zones = document.querySelectorAll('.drop-zone');
    let draggedItem = null;

    items.forEach(item => {
        item.addEventListener('dragstart', function() {
            draggedItem = this;
            setTimeout(() => this.style.opacity = '0.5', 0);
        });

        item.addEventListener('dragend', function() {
            this.style.opacity = '1';
        });
    });

    zones.forEach(zone => {
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('dragenter', function() { this.classList.add('over'); });
        zone.addEventListener('dragleave', function() { this.classList.remove('over'); });
        zone.addEventListener('drop', function() {
            this.classList.remove('over');
            this.appendChild(draggedItem);
        });
    });

    function checkResults() {
        const zones = document.querySelectorAll('.drop-zone');
        let total = document.querySelectorAll('.drag-item').length;
        let correct = 0;

        zones.forEach(zone => {
            const targetType = zone.getAttribute('data-target');
            const itemsInZone = zone.querySelectorAll('.drag-item');
            
            itemsInZone.forEach(item => {
                if (item.getAttribute('data-type') === targetType) {
                    item.className = 'drag-item correct';
                    correct++;
                } else {
                    item.className = 'drag-item wrong';
                }
            });
        });

        const fb = document.getElementById('feedback');
        if (correct === total) {
            fb.style.color = 'var(--success)';
            fb.innerText = 'Отлично! Все элементы распределены верно.';
        } else {
            fb.style.color = 'var(--error)';
            fb.innerText = `Правильно: ${correct} из ${total}.`;
        }
    }
</script>

</body>
</html>
